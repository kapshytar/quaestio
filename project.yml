name: VerityMobile
options:
  minimumXcodeGenVersion: 2.45.3
  deploymentTarget:
    iOS: "17.0"
configs:
  Debug: debug
  Release: release
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.verity.mobile
    SWIFT_VERSION: 6.0
    CURRENT_PROJECT_VERSION: 114
    MARKETING_VERSION: 1.105.0
    DEVELOPMENT_TEAM: "Y7643GTM35"
targets:
  VerityMobile:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ios/VerityMobile
        excludes:
          - Resources/Info.plist
      - path: shared/contracts/servicePresets.json
        buildPhase: resources
      - path: shared/contracts/mergeConfig.json
        buildPhase: resources
      - path: shared/contracts/streamParserConfig.json
        buildPhase: resources
      - path: shared/js/sendMessage.js
        buildPhase: resources
      - path: shared/js/attachFile.js
        buildPhase: resources
      - path: shared/js/scrapeReply.js
        buildPhase: resources
      - path: shared/js/mergeStreamParser.js
        buildPhase: resources
    settings:
      base:
        INFOPLIST_FILE: ios/VerityMobile/Resources/Info.plist
        PRODUCT_NAME: VerityMobile
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies: []
schemes:
  VerityMobile:
    build:
      targets:
        VerityMobile: all
    run:
      config: Debug
    archive:
      config: Release
