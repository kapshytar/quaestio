name: Manual Android Build

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release
          - both
      artifact_type:
        description: 'Artifact Type'
        required: true
        default: 'both'
        type: choice
        options:
          - apk
          - bundle
          - both

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Detect signing config
        id: signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ] && [ -n "$ANDROID_KEYSTORE_PASSWORD" ] && [ -n "$ANDROID_KEY_ALIAS" ] && [ -n "$ANDROID_KEY_PASSWORD" ]; then
            echo "has_signing=true" >> "$GITHUB_OUTPUT"
            echo "Signing configuration detected."
          else
            echo "has_signing=false" >> "$GITHUB_OUTPUT"
            echo "Signing secrets are missing."
          fi

      - name: Decode signing keystore
        if: steps.signing.outputs.has_signing == 'true' && github.event.inputs.build_type != 'debug'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"

      - name: Run Gradle Build
        env:
          VERSION_CODE: ${{ github.run_number }}
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          TASKS=""
          
          # Helper function to add tasks based on artifact type
          add_tasks() {
            local variant=$1
            if [[ "${{ github.event.inputs.artifact_type }}" == "apk" ]]; then
              TASKS="$TASKS assemble$variant"
            elif [[ "${{ github.event.inputs.artifact_type }}" == "bundle" ]]; then
              TASKS="$TASKS bundle$variant"
            elif [[ "${{ github.event.inputs.artifact_type }}" == "both" ]]; then
              # Default to APK for 'both' unless we want to support both types (user said only if requested)
              # If 'both' refers to build types (debug+release), we still respect artifact_type.
              # If artifact_type is 'both', we'll build both APK and AAB for the selected build_type.
              TASKS="$TASKS assemble$variant bundle$variant"
            fi
          }

          # Determine Build Type Tasks
          if [[ "${{ github.event.inputs.build_type }}" == "debug" || "${{ github.event.inputs.build_type }}" == "both" ]]; then
            add_tasks "Debug"
          fi
          
          if [[ "${{ github.event.inputs.build_type }}" == "release" || "${{ github.event.inputs.build_type }}" == "both" ]]; then
            if [[ "${{ steps.signing.outputs.has_signing }}" != "true" ]]; then
              echo "ERROR: Release build requested but signing secrets are missing!"
              exit 1
            fi
            add_tasks "Release"
          fi
          
          echo "Running tasks: $TASKS"
          ./gradlew $TASKS --stacktrace --info

      - name: Collect artifacts
        if: always()
        run: |
          mkdir -p dist
          shopt -s globstar
          # Copy APKs and AABs from known output locations if they exist, avoiding intermediates
          if [ -d "app/build/outputs/apk" ]; then
            find app/build/outputs/apk -name "*.apk" -not -path "*/intermediates/*" -exec cp {} dist/ \;
          fi
          if [ -d "app/build/outputs/bundle" ]; then
            find app/build/outputs/bundle -name "*.aab" -not -path "*/intermediates/*" -exec cp {} dist/ \;
          fi
          
          echo "Final artifacts in dist/:"
          ls -lh dist/ || echo "No artifacts found."

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: manual-build-${{ github.run_number }}-${{ github.event.inputs.build_type }}-${{ github.event.inputs.artifact_type }}
          path: dist/
          if-no-files-found: error
          retention-days: 7
