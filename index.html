<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Aggregator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a1a;
      color: #fff;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #bottom-panel {
      padding: 8px 15px;
      background: #2a2a2a;
      border-top: 2px solid #444;
      flex-shrink: 0;
    }

    #input-container {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    #message-input {
      flex: 1;
      padding: 10px 14px;
      font-size: 14px;
      background: #333;
      border: 2px solid #555;
      border-radius: 8px;
      color: #fff;
      outline: none;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    #message-input:focus {
      border-color: #0066ff;
    }

    #send-btn {
      padding: 10px 28px;
      background: #0066ff;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    #send-btn:hover {
      background: #0052cc;
      transform: translateY(-1px);
    }

    #send-btn:active {
      transform: translateY(0);
    }

    #collapse-toolbar {
      padding: 10px 16px;
      background: #333;
      border: 1px solid #555;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-size: 16px;
      transition: all 0.2s;
    }

    #collapse-toolbar:hover {
      background: #444;
    }

    #toggles {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    #toggles.hidden {
      display: none !important;
    }

    .toggle {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      background: #333;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s;
      font-size: 11px;
    }

    .toggle:hover {
      background: #3a3a3a;
    }

    .toggle input {
      width: 14px;
      height: 14px;
      cursor: pointer;
      accent-color: #0066ff;
    }

    .toggle label {
      cursor: pointer;
      user-select: none;
      font-size: 11px;
      font-weight: 500;
    }

    .status {
      margin-left: 2px;
      font-size: 11px;
      min-width: 12px;
      text-align: center;
    }

    .status.success { color: #00ff00; }
    .status.pending { color: #ffaa00; }
    .status.error { color: #ff0000; }

    .control-btn {
      padding: 3px 10px;
      background: #333;
      border: 1px solid #555;
      border-radius: 4px;
      color: #ccc;
      cursor: pointer;
      font-size: 11px;
      transition: background 0.2s;
    }

    .control-btn:hover {
      background: #444;
      color: #fff;
    }

    #webview-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      flex: 1;
      gap: 2px;
      background: #000;
      padding: 2px;
    }

    webview {
      width: 100%;
      height: 100%;
      background: #fff;
    }

    .webview-container {
      position: relative;
      background: #2a2a2a;
      border-radius: 4px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .webview-header {
      background: #1a1a1a;
      padding: 4px 8px;
      display: flex;
      align-items: center;
      gap: 6px;
      border-bottom: 1px solid #333;
      min-height: 28px;
    }

    .webview-header.hidden {
      display: none;
    }

    .service-select {
      background: #333;
      border: 1px solid #555;
      border-radius: 3px;
      color: #ccc;
      font-size: 10px;
      padding: 2px 4px;
      cursor: pointer;
      min-width: 70px;
    }

    .service-select:focus {
      outline: none;
      border-color: #0066ff;
    }

    .webview-label {
      font-size: 10px;
      font-weight: 600;
      color: #999;
      min-width: 20px;
    }

    .nav-btn {
      background: #333;
      border: 1px solid #555;
      border-radius: 3px;
      color: #aaa;
      font-size: 11px;
      padding: 2px 6px;
      cursor: pointer;
      line-height: 1;
      min-width: 22px;
      text-align: center;
    }

    .nav-btn:hover {
      background: #444;
      color: #fff;
    }

    .nav-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .webview-url {
      flex: 1;
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 3px;
      padding: 2px 8px;
      font-size: 10px;
      color: #ccc;
      font-family: 'Consolas', monospace;
      cursor: text;
    }

    .webview-url:focus {
      outline: none;
      border-color: #0066ff;
      background: #333;
      color: #fff;
    }

    .webview-controls {
      display: flex;
      gap: 4px;
      align-items: center;
      margin-left: 6px;
    }

    .zoom-btn {
      background: #333;
      border: 1px solid #555;
      border-radius: 3px;
      color: #fff;
      font-size: 10px;
      padding: 2px 6px;
      cursor: pointer;
      line-height: 1;
    }

    .zoom-btn:hover {
      background: #444;
    }

    .zoom-level {
      font-size: 10px;
      color: #999;
      min-width: 35px;
      text-align: center;
    }

    .webview-wrapper {
      flex: 1;
      position: relative;
    }

    #import-cookies-btn {
      margin-left: auto;
      padding: 6px 16px;
      background: #333;
      border: 1px solid #555;
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
      font-size: 12px;
    }

    #import-cookies-btn:hover {
      background: #444;
    }
  </style>
</head>
<body>
  <div id="webview-grid">
    <div class="webview-container">
      <div class="webview-header" data-slot="slot-1">
        <select class="service-select" data-slot="slot-1">
          <option value="chatgpt">ChatGPT</option>
          <option value="claude">Claude</option>
          <option value="gemini">Gemini</option>
          <option value="grok">Grok</option>
          <option value="deepseek">DeepSeek</option>
          <option value="perplexity">Perplexity</option>
          <option value="custom">Custom URL</option>
        </select>
        <span class="webview-label" id="slot-label-slot-1">#1</span>
        <button class="nav-btn" data-action="back" title="Back">&#9668;</button>
        <button class="nav-btn" data-action="forward" title="Forward">&#9658;</button>
        <button class="nav-btn" data-action="reload" title="Reload">&#10227;</button>
        <button class="nav-btn" data-action="stop" title="Stop Loading" style="color: #ff4444;">&#9632;</button>
        <input class="webview-url" type="text" value="" title="Edit URL and press Enter">
        <div class="webview-controls">
          <button class="zoom-btn" data-action="zoom-out">&#8722;</button>
          <span class="zoom-level">100%</span>
          <button class="zoom-btn" data-action="zoom-in">+</button>
          <button class="zoom-btn" data-action="zoom-reset">&#10226;</button>
        </div>
      </div>
      <div class="webview-wrapper">
        <webview id="webview-slot-1"
          partition="persist:shared"
          allowpopups>
        </webview>
      </div>
    </div>

    <div class="webview-container">
      <div class="webview-header" data-slot="slot-2">
        <select class="service-select" data-slot="slot-2">
          <option value="chatgpt">ChatGPT</option>
          <option value="claude" selected>Claude</option>
          <option value="gemini">Gemini</option>
          <option value="grok">Grok</option>
          <option value="deepseek">DeepSeek</option>
          <option value="perplexity">Perplexity</option>
          <option value="custom">Custom URL</option>
        </select>
        <span class="webview-label" id="slot-label-slot-2">#2</span>
        <button class="nav-btn" data-action="back" title="Back">&#9668;</button>
        <button class="nav-btn" data-action="forward" title="Forward">&#9658;</button>
        <button class="nav-btn" data-action="reload" title="Reload">&#10227;</button>
        <button class="nav-btn" data-action="stop" title="Stop" style="color: #ff4444;">&#9632;</button>
        <input class="webview-url" type="text" value="" title="Edit URL and press Enter">
        <div class="webview-controls">
          <button class="zoom-btn" data-action="zoom-out">&#8722;</button>
          <span class="zoom-level">100%</span>
          <button class="zoom-btn" data-action="zoom-in">+</button>
          <button class="zoom-btn" data-action="zoom-reset">&#10226;</button>
        </div>
      </div>
      <div class="webview-wrapper">
        <webview id="webview-slot-2"
          partition="persist:shared"
          allowpopups>
        </webview>
      </div>
    </div>

    <div class="webview-container">
      <div class="webview-header" data-slot="slot-3">
        <select class="service-select" data-slot="slot-3">
          <option value="chatgpt">ChatGPT</option>
          <option value="claude">Claude</option>
          <option value="gemini" selected>Gemini</option>
          <option value="grok">Grok</option>
          <option value="deepseek">DeepSeek</option>
          <option value="perplexity">Perplexity</option>
          <option value="custom">Custom URL</option>
        </select>
        <span class="webview-label" id="slot-label-slot-3">#3</span>
        <button class="nav-btn" data-action="back" title="Back">&#9668;</button>
        <button class="nav-btn" data-action="forward" title="Forward">&#9658;</button>
        <button class="nav-btn" data-action="reload" title="Reload">&#10227;</button>
        <button class="nav-btn" data-action="stop" title="Stop" style="color: #ff4444;">&#9632;</button>
        <input class="webview-url" type="text" value="" title="Edit URL and press Enter">
        <div class="webview-controls">
          <button class="zoom-btn" data-action="zoom-out">&#8722;</button>
          <span class="zoom-level">100%</span>
          <button class="zoom-btn" data-action="zoom-in">+</button>
          <button class="zoom-btn" data-action="zoom-reset">&#10226;</button>
        </div>
      </div>
      <div class="webview-wrapper">
        <webview id="webview-slot-3"
          partition="persist:shared"
          allowpopups>
        </webview>
      </div>
    </div>

    <div class="webview-container">
      <div class="webview-header" data-slot="slot-4">
        <select class="service-select" data-slot="slot-4">
          <option value="chatgpt">ChatGPT</option>
          <option value="claude">Claude</option>
          <option value="gemini">Gemini</option>
          <option value="grok" selected>Grok</option>
          <option value="deepseek">DeepSeek</option>
          <option value="perplexity">Perplexity</option>
          <option value="custom">Custom URL</option>
        </select>
        <span class="webview-label" id="slot-label-slot-4">#4</span>
        <button class="nav-btn" data-action="back" title="Back">&#9668;</button>
        <button class="nav-btn" data-action="forward" title="Forward">&#9658;</button>
        <button class="nav-btn" data-action="reload" title="Reload">&#10227;</button>
        <button class="nav-btn" data-action="stop" title="Stop" style="color: #ff4444;">&#9632;</button>
        <input class="webview-url" type="text" value="" title="Edit URL and press Enter">
        <div class="webview-controls">
          <button class="zoom-btn" data-action="zoom-out">&#8722;</button>
          <span class="zoom-level">100%</span>
          <button class="zoom-btn" data-action="zoom-in">+</button>
          <button class="zoom-btn" data-action="zoom-reset">&#10226;</button>
        </div>
      </div>
      <div class="webview-wrapper">
        <webview id="webview-slot-4"
          partition="persist:shared"
          allowpopups>
        </webview>
      </div>
    </div>
  </div>

  <div id="bottom-panel">
    <div id="toggles">
      <div class="toggle">
        <input type="checkbox" id="toggle-slot-1" checked>
        <label for="toggle-slot-1" id="label-slot-1">Slot 1</label>
        <span class="status" id="status-slot-1"></span>
      </div>
      <div class="toggle">
        <input type="checkbox" id="toggle-slot-2" checked>
        <label for="toggle-slot-2" id="label-slot-2">Slot 2</label>
        <span class="status" id="status-slot-2"></span>
      </div>
      <div class="toggle">
        <input type="checkbox" id="toggle-slot-3" checked>
        <label for="toggle-slot-3" id="label-slot-3">Slot 3</label>
        <span class="status" id="status-slot-3"></span>
      </div>
      <div class="toggle">
        <input type="checkbox" id="toggle-slot-4" checked>
        <label for="toggle-slot-4" id="label-slot-4">Slot 4</label>
        <span class="status" id="status-slot-4"></span>
      </div>
      <button class="control-btn" id="toggle-address-bar-btn">Hide Address Bar</button>
      <button class="control-btn" id="import-cookies-btn">Import &#127850;</button>
    </div>
    <div id="input-container">
      <input
        type="text"
        id="message-input"
        placeholder="Type message and press Enter..."
        autocomplete="off"
      >
      <button id="send-btn">Send</button>
      <button id="collapse-toolbar">&#9776;</button>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
