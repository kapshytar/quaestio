<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- iOS-style rounded square background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="135%" y2="135%">
      <stop offset="0%" style="stop-color:#f5f5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#efefef;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="highlight" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="120" height="120" rx="33" fill="url(#bgGradient)" />
  
  <!-- Highlight overlay -->
  <rect width="120" height="120" rx="33" fill="url(#highlight)" />
  
  <!-- Shadow -->
  <rect width="120" height="120" rx="33" fill="none" stroke="#00000010" stroke-width="1" />
  
  <!-- Background G letter - 110% -->
  <text x="60" y="72" font-size="132" font-weight="900" text-anchor="middle" dominant-baseline="middle" fill="#1a1a1a" opacity="0.12">G</text>
  
  <!-- Main node with white glow -->
  <circle cx="60" cy="42" r="8" stroke="#1a1a1a" fill="none" stroke-width="1.5" filter="drop-shadow(0 0 2px rgba(255,255,255,0.8))" />
  
  <!-- Connecting lines with white glow -->
  <line x1="60" y1="50" x2="60" y2="65" stroke="#1a1a1a" stroke-width="1" opacity="0.5" filter="drop-shadow(0 0 1.5px rgba(255,255,255,0.6))" />
  
  <!-- Support nodes with white glow -->
  <circle cx="32" cy="82" r="5" stroke="#1a1a1a" fill="none" stroke-width="1" opacity="0.6" filter="drop-shadow(0 0 1.5px rgba(255,255,255,0.6))" />
  <circle cx="50" cy="86" r="5" stroke="#1a1a1a" fill="none" stroke-width="1" opacity="0.6" filter="drop-shadow(0 0 1.5px rgba(255,255,255,0.6))" />
  <circle cx="70" cy="86" r="5" stroke="#1a1a1a" fill="none" stroke-width="1" opacity="0.6" filter="drop-shadow(0 0 1.5px rgba(255,255,255,0.6))" />
  <circle cx="88" cy="82" r="5" stroke="#1a1a1a" fill="none" stroke-width="1" opacity="0.6" filter="drop-shadow(0 0 1.5px rgba(255,255,255,0.6))" />
  
  <!-- Branch lines with white glow -->
  <line x1="48" y1="72" x2="32" y2="77" stroke="#1a1a1a" stroke-width="0.8" opacity="0.4" filter="drop-shadow(0 0 1px rgba(255,255,255,0.5))" />
  <line x1="55" y1="72" x2="50" y2="81" stroke="#1a1a1a" stroke-width="0.8" opacity="0.4" filter="drop-shadow(0 0 1px rgba(255,255,255,0.5))" />
  <line x1="65" y1="72" x2="70" y2="81" stroke="#1a1a1a" stroke-width="0.8" opacity="0.4" filter="drop-shadow(0 0 1px rgba(255,255,255,0.5))" />
  <line x1="72" y1="72" x2="88" y2="77" stroke="#1a1a1a" stroke-width="0.8" opacity="0.4" filter="drop-shadow(0 0 1px rgba(255,255,255,0.5))" />
</svg>