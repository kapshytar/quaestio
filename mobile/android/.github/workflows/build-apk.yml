name: Build Android Artifacts

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '.github/workflows/manual-build.yml'
      - '**.md'
      - 'tools/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '.github/workflows/manual-build.yml'
      - '**.md'
      - 'tools/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Detect signing config
        id: signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ] && [ -n "$ANDROID_KEYSTORE_PASSWORD" ] && [ -n "$ANDROID_KEY_ALIAS" ] && [ -n "$ANDROID_KEY_PASSWORD" ]; then
            echo "has_signing=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_signing=false" >> "$GITHUB_OUTPUT"
            echo "Signing secrets are missing."
          fi

      - name: Warn when signing is missing
        if: steps.signing.outputs.has_signing != 'true'
        run: |
          echo "Signing secrets are missing, building debug APK fallback."
          echo "Updatable release requires: ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD"

      - name: Decode signing keystore
        if: steps.signing.outputs.has_signing == 'true'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"

      - name: Build release APK + AAB
        id: release_build
        if: steps.signing.outputs.has_signing == 'true'
        continue-on-error: true
        env:
          VERSION_CODE: ${{ github.run_number }}
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -o pipefail
          ./gradlew assembleRelease bundleRelease --stacktrace --info 2>&1 | tee ci-gradle-release.log

      - name: Warn when signed release build fails
        if: steps.release_build.conclusion == 'failure'
        run: |
          echo "Signed release build failed; publishing debug APK fallback."
          echo "Check signing secrets validity (keystore, alias, and passwords)."

      - name: Build debug APK (fallback)
        if: steps.signing.outputs.has_signing != 'true' || steps.release_build.conclusion == 'failure'
        run: |
          set -o pipefail
          ./gradlew assembleDebug --stacktrace --info 2>&1 | tee ci-gradle-debug.log

      - name: Collect diagnostics
        if: always()
        run: |
          mkdir -p ci-logs
          {
            echo "=== Run context ==="
            echo "run_id=${{ github.run_id }}"
            echo "run_number=${{ github.run_number }}"
            echo "sha=${{ github.sha }}"
            echo "release_build_conclusion=${{ steps.release_build.conclusion }}"
            echo "has_signing=${{ steps.signing.outputs.has_signing }}"
            echo
            echo "=== APK outputs ==="
            ls -la app/build/outputs/apk || true
            find app/build/outputs/apk -maxdepth 4 -type f || true
            echo
            echo "=== AAB outputs ==="
            ls -la app/build/outputs/bundle || true
            find app/build/outputs/bundle -maxdepth 4 -type f || true
          } | tee ci-logs/outputs-summary.log
          cp -f ci-gradle-release.log ci-logs/ 2>/dev/null || true
          cp -f ci-gradle-debug.log ci-logs/ 2>/dev/null || true

      - name: Collect artifacts
        if: always()
        run: |
          mkdir -p dist
          shopt -s nullglob
          # Collect APKs
          for f in app/build/outputs/apk/release/*.apk; do
            cp "$f" "dist/$(basename "$f")"
          done
          # Collect AABs
          for f in app/build/outputs/bundle/release/*.aab; do
            cp "$f" "dist/$(basename "$f")"
          done
          # Collect R8 mapping file (for Google Play deobfuscation)
          [ -f app/build/outputs/mapping/release/mapping.txt ] && \
            cp app/build/outputs/mapping/release/mapping.txt dist/mapping.txt || true
          
          apk_count=$(find dist -maxdepth 1 -type f -name "*.apk" | wc -l | tr -d ' ')
          aab_count=$(find dist -maxdepth 1 -type f -name "*.aab" | wc -l | tr -d ' ')
          
          if [ "$apk_count" -eq 0 ] && [ "$aab_count" -eq 0 ]; then
            echo "No release artifacts found; building debug APK fallback."
            ./gradlew assembleDebug --stacktrace --info 2>&1 | tee ci-gradle-debug-fallback.log
            for f in app/build/outputs/apk/debug/*.apk; do
              cp "$f" "dist/$(basename "$f")"
            done
          fi
          ls -la dist || true
          apk_count=$(find dist -maxdepth 1 -type f -name "*.apk" | wc -l | tr -d ' ')
          echo "apk_count=$apk_count" | tee ci-logs/apk-count.log
          echo "aab_count=$aab_count" | tee ci-logs/aab-count.log
          cp -f ci-gradle-debug-fallback.log ci-logs/ 2>/dev/null || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chat-aggregator-build-${{ github.run_number }}
          path: dist/
          if-no-files-found: error
          retention-days: 5

      - name: Upload CI diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: chat-aggregator-ci-logs-${{ github.run_number }}
          path: ci-logs/
          if-no-files-found: error
          retention-days: 3
